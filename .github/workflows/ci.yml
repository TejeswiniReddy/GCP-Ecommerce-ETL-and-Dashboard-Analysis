name: Retail ETL CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  lint-and-test:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install apache-beam[gcp] pytest pytest-cov ruff

      - name: Lint with ruff
        run: ruff check etl/ tests/ data/

      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --cov=etl \
            --cov-report=xml \
            --cov-report=term-missing \
            -k "not integration"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unit

  dbt-validate:
    name: dbt Compile and Schema Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt
        run: pip install dbt-bigquery==1.7.0

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          retail_analytics:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: retail_staging
                threads: 4
                keyfile_json: ${{ secrets.GCP_SA_KEY }}
          EOF

      - name: dbt deps
        working-directory: dbt_transforms
        run: dbt deps

      - name: dbt compile (syntax check)
        working-directory: dbt_transforms
        run: dbt compile --profiles-dir ~/.dbt

  terraform-validate:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -no-color
