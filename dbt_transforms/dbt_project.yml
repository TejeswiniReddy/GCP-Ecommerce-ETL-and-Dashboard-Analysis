name: retail_analytics
version: "1.0.0"
config-version: 2

profile: retail_analytics

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  retail_analytics:
    staging:
      +materialized: view
      +schema: retail_staging
      +tags: ["staging", "silver"]
    intermediate:
      +materialized: ephemeral
      +tags: ["intermediate"]
    marts:
      +materialized: table
      +schema: retail_marts
      +tags: ["mart", "gold"]
      revenue:
        +materialized: table
      customers:
        +materialized: table
      products:
        +materialized: table

vars:
  start_date: "2022-01-01"
  currency: "USD"
